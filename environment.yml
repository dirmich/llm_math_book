name: llm-math
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy>=1.24
  - matplotlib>=3.7
  - scipy>=1.10
  - scikit-learn>=1.3
  - pytorch>=2.0
  - cpuonly  # Install a GPU build separately if needed.
  - pip
  - jupyter
  - ipykernel
  - tqdm
  - pandas
  - pip:
    - nbformat>=5.9
    - tokenizers>=0.15
